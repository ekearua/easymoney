{{define "merchant_settings.html"}}
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} · {{.AppName}}</title><link rel="stylesheet" href="/static/styles.css"></head>
<body>{{template "merchant_nav" .}}<main class="dashboard">
  <h1>Payment settings</h1>
  {{if index . "Saved"}}<div class="alert success">Settings saved.</div>{{end}}
  <section class="panel">
    <form method="post" action="/merchant/settings">
      <input type="hidden" name="csrf_token" value="{{.CSRF}}">

      <h2>Invoice payment terms</h2>
      <p class="muted">Control how customers can pay invoices for your store.</p>

      <label class="checkbox-row">
        <input type="checkbox" name="allow_partial_payments" {{if .Merchant.AllowPartialPayments}}checked{{end}}>
        Allow partial payments (installments)
      </label>

      <div class="form-grid">
        <label>Minimum invoice amount (kobo)
          <input type="number" name="min_invoice_amount_kobo" value="{{.Merchant.MinInvoiceAmountKobo}}" min="0">
        </label>
        <label>Upfront percent
          <input type="number" name="upfront_percent" value="{{.Merchant.UpfrontPercent}}" min="0" max="100">
        </label>
        <label>Minimum installment percent
          <input type="number" name="min_installment_percent" value="{{.Merchant.MinInstallmentPercent}}" min="0" max="100">
        </label>
        <label>Maximum installments
          <input type="number" name="max_installments" value="{{.Merchant.MaxInstallments}}" min="0" max="100">
        </label>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" name="allow_full_pay_always" {{if .Merchant.AllowFullPayAlways}}checked{{end}}>
        Always allow full payment regardless of rules above
      </label>

      <button type="submit">Save settings</button>
    </form>
  </section>
</main></body></html>
{{end}}
