services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_payment
      POSTGRES_USER: whatsapp_payment
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_payment -d whatsapp_payment"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [private]

  migrate:
    build: .
    command: ["migrate"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://whatsapp_payment:${POSTGRES_PASSWORD}@db:5432/whatsapp_payment?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks: [private]
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://whatsapp_payment:${POSTGRES_PASSWORD}@db:5432/whatsapp_payment?sslmode=disable
      HTTP_ADDR: :8080
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/demo", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [private]

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks: [private]

networks:
  private:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
